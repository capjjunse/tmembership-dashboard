name: T멤버십 대시보드 자동 갱신

on:
  schedule:
    - cron: '30 0 * * 2'  # 매주 화요일 09:30 KST (= UTC 00:30)
  workflow_dispatch:        # 수동 실행 버튼 (테스트용)

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic requests beautifulsoup4

      - name: 파이프라인 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATALAB_CLIENT_ID: ${{ secrets.DATALAB_CLIENT_ID }}
          DATALAB_CLIENT_SECRET: ${{ secrets.DATALAB_CLIENT_SECRET }}
          NAVER_SEARCH_CLIENT_ID: ${{ secrets.NAVER_SEARCH_CLIENT_ID }}
          NAVER_SEARCH_CLIENT_SECRET: ${{ secrets.NAVER_SEARCH_CLIENT_SECRET }}
        run: python pipeline/main.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto update $(date +'%Y-%m-%d %H:%M') KST"
          git push
